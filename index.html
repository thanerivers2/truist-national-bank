<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FutureBank Demo</title>
<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f6fb;
}

.header{
background:#1e3c72;
color:white;
padding:20px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.balance-card{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
cursor:pointer;
background:#1e88e5;
color:white;
width:100%;
}

input{
padding:10px;
width:100%;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

.hidden{display:none;}

.tx{
font-size:13px;
border-bottom:1px solid #ddd;
padding:6px 0;
}
</style>
</head>
<body>

<div id="loginPage" class="container">
<h2>FutureBank Demo Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div id="app" class="hidden">
<div class="header" id="appHeader"></div>
<div class="container" id="appContent"></div>
</div>

<script>
let bankData = JSON.parse(localStorage.getItem("bankData"));

if(!bankData){
bankData={
users:{
admin:{
password:"admin123",
name:"Bank Admin",
role:"admin",
balance:0,
account:"0000000000",
history:[]
}
},
accountCounter:1000000001
};
localStorage.setItem("bankData",JSON.stringify(bankData));
}

let currentUser=null;

function save(){
localStorage.setItem("bankData",JSON.stringify(bankData));
}

function login(){
let u=loginUser.value.trim();
let p=loginPass.value.trim();
let user=bankData.users[u];

if(user && user.password===p){
currentUser=u;
loginPage.classList.add("hidden");
app.classList.remove("hidden");
loadDashboard();
}else{
loginMsg.innerText="Invalid login";
}
}

function logout(){
location.reload();
}

function loadDashboard(){
let user=bankData.users[currentUser];
appHeader.innerText="Welcome, "+user.name;

if(user.role==="admin"){
loadAdmin();
}else{
loadUser();
}
}

function loadAdmin(){
let html=`
<div class="card balance-card">
<h3>Admin Dashboard</h3>
Total Users: ${Object.keys(bankData.users).length-1}
</div>

<div class="card">
<h4>Create User</h4>
<input id="newName" placeholder="Full Name">
<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<button onclick="createUser()">Create</button>
</div>

<div class="card">
<h4>Deposit To Account</h4>
<input id="depAcc" placeholder="Account Number">
<input id="depAmt" placeholder="Amount">
<button onclick="deposit()">Deposit</button>
</div>

<div class="card">
<h4>All Transactions</h4>
<div>${bankData.users.admin.history.map(t=><div class='tx'>${t}</div>).join("")}</div>
</div>

<button onclick="logout()">Logout</button>
`;

appContent.innerHTML=html;
}

function loadUser(){
let user=bankData.users[currentUser];

let html=`
<div class="card balance-card">
<h3>$${user.balance}</h3>
<p>${user.name}</p>
<p>Acc: ${user.account}</p>
</div>

<div class="card">
<h4>Send Money</h4>
<input id="sendAcc" placeholder="Receiver Account">
<input id="sendAmt" placeholder="Amount">
<button onclick="sendMoney()">Send</button>
</div>

<div class="card">
<h4>Withdraw</h4>
<input id="withAmt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
<h4>Transaction History</h4>
<div>${user.history.map(t=><div class='tx'>${t}</div>).join("")}</div>
</div>

<button onclick="logout()">Logout</button>
`;

appContent.innerHTML=html;
}

function createUser(){
let name=newName.value;
let uname=newUser.value;
let pass=newPass.value;

if(bankData.users[uname]) return alert("Username exists");

let acc=(bankData.accountCounter++).toString();

bankData.users[uname]={
password:pass,
name:name,
role:"user",
balance:0,
account:acc,
history:[]
};

save();
alert("User created.\nAccount: "+acc);
loadAdmin();
}

function deposit(){
let acc=depAcc.value;
let amt=parseInt(depAmt.value);

let user=findByAcc(acc);
if(!user) return alert("Account not found");

bankData.users[user].balance+=amt;

let ref=generateRef();
let record=new Date().toLocaleString()+" | Deposit $"+amt+" | Ref:"+ref;

bankData.users[user].history.push(record);
bankData.users.admin.history.push(record);

save();
loadAdmin();
}

function sendMoney(){
let acc=sendAcc.value;
let amt=parseInt(sendAmt.value);
let sender=bankData.users[currentUser];
let receiver=findByAcc(acc);

if(!receiver) return alert("Account not found");
if(sender.balance<amt) return alert("Insufficient funds");

sender.balance-=amt;
bankData.users[receiver].balance+=amt;

let ref=generateRef();
let record=new Date().toLocaleString()+" | Sent $"+amt+" | Ref:"+ref;

sender.history.push(record);
bankData.users[receiver].history.push(record);
bankData.users.admin.history.push(record);

save();
loadUser();
}

function withdraw(){
let amt=parseInt(withAmt.value);
let user=bankData.users[currentUser];
if(user.balance<amt) return alert("Insufficient funds");

user.balance-=amt;

let ref=generateRef();
let record=new Date().toLocaleString()+" | Withdraw $"+amt+" | Ref:"+ref;

user.history.push(record);
bankData.users.admin.history.push(record);

save();
loadUser();
}

function findByAcc(acc){
for(let u in bankData.users){
if(bankData.users[u].account===acc) return u;
}
return null;
}

function generateRef(){
return "TX"+Math.floor(Math.random()*1000000);
}
</script>

</body>
</html>
